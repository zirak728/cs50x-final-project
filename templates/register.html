{% extends "layout.html" %}

{% block title %}Registration{% endblock %}

{% block main %}
<div style="max-width: 400px; margin: 0 auto;">
    <h1 class="mb-4 text-center">Registration</h1>
    <form action="/register" method="post">
        <div class="mb-3">
            <input autofocus class="form-control" name="username" placeholder="Username" required type="text">
        </div>
        <div class="mb-3">
            <input class="form-control" name="email" placeholder="Email" required type="email">
        </div>
        <div class="mb-3">
            <input class="form-control" name="password" placeholder="Password" required type="password">
        </div>
        <div class="mb-3">
            <input class="form-control" name="confirmation" placeholder="Confirm Password" required type="password">
        </div>
        <button class="btn btn-primary w-100" type="submit">Next</button>
    </form>
</div>
{% endblock %}
