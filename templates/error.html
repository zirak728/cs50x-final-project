{% extends "layout.html" %}
{% block title %}Error{% endblock %}
{% block main %}

<div style="max-width: 500px; margin: 0 auto; text-align: center; padding: 2rem 0;">
    <img src="/static/owl_error.svg" alt="Confused owl" style="width: 180px; margin-bottom: 1.5rem;">
    <h2 style="color: var(--primary);">{{ title }}</h2>
    <p class="text-muted mb-4">{{ message }}</p>
    <a href="/" class="btn btn-primary">← Back to Home</a>
</div>

{% endblock %}
